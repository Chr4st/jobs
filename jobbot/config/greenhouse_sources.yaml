# ── Role filters — configure what you want to apply to ───────────────────────
# Edit these to focus the bot on specific role types.
role_filters:
  # Which role families to include (comment out any you don't want)
  families:
    - quant        # Quant research / trading / algo — strongest fit (USAMO/Putnam)
    - ml           # ML / AI / research engineer — Cambridge publication fit
    - fullstack    # SWE / backend / infra — Tencent infra background
    # - founding   # Founding engineer / 0-to-1 — uncomment to enable

  # Optional: title must contain at least one of these (leave empty = no extra filter)
  require_title_keywords: []

  # Titles containing ANY of these are skipped (on top of PhD/senior filters)
  exclude_title_keywords:
    - "legal"
    - "privacy"
    - "hr "
    - "people team"
    - "physical security"
    - "product manager"
    - "product management"
    - "finance intern"
    - "accounting"
    - "marketing"
    - "sales"
    - "recruiting"

# Title filter patterns (case-insensitive)
intern_pattern: '\b(intern|internship|co-op|co op)\b'
engineering_keywords:
  - engineer
  - developer
  - software
  - swe
  - ml
  - ai
  - data
  - quant
  - trading
  - researcher
  - fullstack
  - full-stack
  - full stack
  - backend
  - frontend
  - infrastructure
  - systems
  - platform
  - devops
  - research
